services:
    - type: web
    name: craftsure-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
            - key: PORT
        value: 10000
            - key: DATABASE_URL
        sync: false
            - key: PAYSTACK_SECRET_KEY
        sync: false
            - key: JWT_SECRET
        generateValue: true
            - key: CLOUDINARY_CLOUD_NAME
        sync: false
            - key: CLOUDINARY_API_KEY
        sync: false
            - key: CLOUDINARY_API_SECRET
        sync: false
            - key: FRONTEND_URL
        value: https://craftsure.vercel.app
